<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your state — StateID</title>
    <style>
      body { background: #0b0b0c; color: #e8e8ea; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; display:flex; min-height:100vh; align-items:center; justify-content:center; }
      .card { background:#121214; padding:24px; border-radius:12px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      h1 { font-size: 18px; margin: 0 0 12px; }
      p { margin: 0 0 12px; color:#b9bbc6; }
      select, button { width:100%; padding:10px; border-radius:8px; border:1px solid #2a2a2e; background:#1a1a1d; color:#e8e8ea; }
      button { margin-top:10px; background:#2e6df6; border: none; cursor:pointer; }
      .ok { margin-top:10px; color: #9fe870; }
      .err { margin-top:10px; color: #ff7a7a; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Quick confirmation</h1>
      <p>Tap your current state for your therapist's records. Your call will continue uninterrupted.</p>
      <select id="state">
        <option value="">Select state…</option>
      </select>
      <button id="submit">Confirm state</button>
      <div id="msg"></div>
    </div>
    <script>
      const states = [
        'AL','AK','AZ','AR','CA','CO','CT','DE','DC','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','Outside U.S.'
      ];
      const sel = document.getElementById('state');
      states.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
      const qs = new URLSearchParams(location.search);
      const sessionId = qs.get('session');
      const submit = document.getElementById('submit');
      const msg = document.getElementById('msg');
      submit.addEventListener('click', async () => {
        const v = sel.value;
        if (!v) { msg.textContent = 'Please select a state'; msg.className='err'; return; }
        try {
          const r = await fetch('/api/ledger/record', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ sessionId, status: 'verified', state: v, method: 'self_declared', withinScope: 'unknown' })
          });
          if (!r.ok) throw new Error(await r.text());
          msg.textContent = 'Thanks! You can return to your call.';
          msg.className='ok';
          setTimeout(() => window.close(), 1200);
        } catch (e) {
          msg.textContent = 'Something went wrong.';
          msg.className='err';
        }
      });
    </script>
  </body>
</html>
